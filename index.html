    .icon-btn{

      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      display:grid; place-items:center;
      transition: transform .14s ease, background .14s ease, border-color .14s ease;

    .icon-btn:hover{

    .icon-btn img{

    .body{padding:16px 22px 22px}
    .grid{display:grid; gap:12px}

    .banner:hover{
      transform: translateY(-1px);
      border-color:rgba(255,255,255,.22);

    .banner img{

            <div class="banner-text">

  <script>
    // ========= 你只要改這裡（檔名放 repo 根目錄即可） =========
    const LOGO_FILENAME = "logo.png";        // 例：logo.png / logo.jpg / logo.svg
    const BANNER_FILENAME = "banner.jpg";    // 例：banner.jpg
    const IG_ICON_FILENAME = "icon-ig.svg";  // 例：icon-ig.png 或 icon-ig.svg
    const THREADS_ICON_FILENAME = "icon-threads.svg"; // 例：icon-threads.png 或 icon-threads.svg

    // ========= 固定設定 =========
    const IG_URL = "https://www.instagram.com/mu.yue.art/";
    const THREADS_URL = "https://www.threads.net/@mu.yue.art";
    const GO_HTML = "https://zramj.github.io/muyue-go/go.html";

    // ========= 讀取入口 UTM（用來判斷 IG vs Threads） =========
    const qs = new URLSearchParams(location.search);
    const utm_source   = qs.get("utm_source")   || "(none)";
    const utm_medium   = qs.get("utm_medium")   || "(none)";
    const utm_campaign = qs.get("utm_campaign") || "(none)";
    const utm_content  = qs.get("utm_content")  || "(none)";
    const is_admin = qs.get("admin") === "1";

    // Assets (auto apply by filename)
    const base = location.origin + location.pathname.replace(/\/[^\/]*$/, "/");
    const setImg = (el, filename, fallbackSvg) => {
      if (!el || !filename) return;
      el.src = base + filename;
      el.onerror = () => {
        if (fallbackSvg) {
          el.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(fallbackSvg);
        }
      };
    };

    // Logo
    const avatarImg = document.getElementById("avatarImg");
    const moon = document.getElementById("fallbackMoon");
    if (LOGO_FILENAME) {
      setImg(avatarImg, LOGO_FILENAME, null);
      avatarImg.style.display = "block";
      moon.style.display = "none";
    }

    // Social icons (fallback SVG if missing)
    const igIconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5Z" stroke="white" opacity=".85"/><path d="M12 8.2a3.8 3.8 0 1 1 0 7.6 3.8 3.8 0 0 1 0-7.6Z" stroke="white" opacity=".85"/><path d="M17.6 6.6h.01" stroke="white" stroke-width="3" stroke-linecap="round"/></svg>`;
    const threadsIconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"><path d="M7.2 7.2c.8-1.8 2.6-3 4.8-3 2.6 0 4.7 1.6 5.3 3.8" stroke="white" opacity=".85" stroke-linecap="round"/><path d="M6.2 12c0-3.2 2.6-5.8 5.8-5.8 3.3 0 6 2.6 6 5.8 0 3.3-2.7 6-6 6-3.2 0-5.8-2.7-5.8-6Z" stroke="white" opacity=".85"/><path d="M10 12.5c1 .9 3 .9 4 0" stroke="white" opacity=".85" stroke-linecap="round"/></svg>`;
    setImg(document.getElementById("igIcon"), IG_ICON_FILENAME, igIconSvg);
    setImg(document.getElementById("threadsIcon"), THREADS_ICON_FILENAME, threadsIconSvg);

    // Social links
    const btnIG = document.getElementById("btnIG");
    const btnThreads = document.getElementById("btnThreads");
    btnIG.href = IG_URL;
    btnThreads.href = THREADS_URL;

    // Build go.html URL with carried UTM
    const goUrl = new URL(GO_HTML);
    [["utm_source",utm_source],["utm_medium",utm_medium],["utm_campaign",utm_campaign],["utm_content",utm_content]]
      .forEach(([k,v]) => { if (v && v !== "(none)") goUrl.searchParams.set(k, v); });

    // Banner image & click target
    setImg(document.getElementById("bannerImg"), BANNER_FILENAME, null);

    const btnBuy = document.getElementById("btnBuy");
    btnBuy.href = goUrl.toString();
    btnBuy.addEventListener("click", () => {
      if (typeof gtag === "function") {
        gtag("event", "entry_click_buy", {
          utm_source, utm_medium, utm_campaign, utm_content,
          destination: GO_HTML
        });
      }
    }, { passive: true });

    // Entry view event
    if (typeof gtag === "function") {
      gtag("event", "entry_view", {
        utm_source, utm_medium, utm_campaign, utm_content,
        page_path: location.pathname
      });
    }

    // Admin-only block
    if (is_admin) {
      const adminOnly = document.getElementById("adminOnly");
      adminOnly.style.display = "block";
      document.getElementById("dbg_source").textContent = utm_source;
      document.getElementById("dbg_medium").textContent = utm_medium;
      document.getElementById("dbg_campaign").textContent = utm_campaign;
      document.getElementById("dbg_content").textContent = utm_content;
      document.getElementById("dbg_go").textContent = goUrl.toString();
    }

    // Subscribe tracking
    const signup = document.getElementById("benchmarkSignup");
    if (signup) {
      let fired = false;
      signup.addEventListener("click", () => {
        if (fired) return;
        fired = true;
        if (typeof gtag === "function") {
          gtag("event", "subscribe_form_interact", {
            utm_source, utm_medium, utm_campaign, utm_content,
            provider: "benchmarkemail"
          });
        }
      }, { passive: true });

      document.addEventListener("submit", (e) => {
        const t = e.target;
        if (t && signup.contains(t)) {
          if (typeof gtag === "function") {
            gtag("event", "subscribe_submit", {
              utm_source, utm_medium, utm_campaign, utm_content,
              provider: "benchmarkemail"
            });
          }
        }
      }, true);
    }
  </script>
