<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>晨露詩篇｜沐閱 MUYUE</title>
    <style>
        :root {
            --bg-primary: #F5EDE3;
            --text: #3D2E1F;
            --muted: #7A6B5D;
            --accent: #8B6F4E;
            --stroke: rgba(139, 111, 78, .12);
            --card-bg: rgba(255, 255, 255, .58);
            --shadow: 0 12px 40px rgba(139, 111, 78, .08);
            --font-serif: "Noto Serif TC", "Songti TC", "PMingLiU", serif;
            --font-sans: "Noto Sans TC", ui-sans-serif, system-ui, -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100svh;
            color: var(--text);
            background:
                radial-gradient(ellipse 840px 520px at 18% 8%, rgba(180, 150, 110, .16), transparent 62%),
                radial-gradient(ellipse 720px 480px at 88% 78%, rgba(255, 252, 247, .72), transparent 58%),
                var(--bg-primary);
            font-family: var(--font-sans);
            font-weight: 300;
            line-height: 1.7;
        }

        .detail-nav {
            min-height: 74px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 18px clamp(24px, 6vw, 72px);
        }

        .brand,
        .back-link,
        .other-link {
            color: var(--text);
            text-decoration: none;
        }

        .brand {
            font-family: var(--font-serif);
            letter-spacing: 1px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 16px;
            border: 1px solid var(--stroke);
            border-radius: 999px;
            background: rgba(255, 252, 248, .58);
            color: var(--accent);
            font-size: 13px;
            box-shadow: var(--shadow);
        }

        main {
            min-height: calc(100svh - 250px);
        }

        .other-products {
            padding: 38px clamp(24px, 6vw, 72px) 54px;
        }

        .other-title {
            font-family: var(--font-serif);
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 18px;
        }

        .other-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }

        .other-link {
            min-height: 86px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 18px;
            border: 1px solid var(--stroke);
            border-radius: 18px;
            background: var(--card-bg);
            box-shadow: var(--shadow);
        }

        .other-link span {
            font-family: var(--font-serif);
            font-size: 17px;
            font-weight: 600;
            letter-spacing: .8px;
        }

        .other-link small {
            color: var(--muted);
            font-size: 12px;
            letter-spacing: .3px;
        }

        @media (max-width: 720px) {
            .detail-nav {
                align-items: flex-start;
                flex-direction: column;
            }

            .other-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header class="detail-nav">
        <a class="brand" href="index.html">沐閱 MUYUE</a>
        <a class="back-link" href="index.html#products">返回香氛蠟燭</a>
    </header>

    <main aria-label="晨露詩篇產品詳細頁"></main>

    <section class="other-products" aria-label="其他香氣">
        <div class="other-title">其他香氣</div>
        <div class="other-grid">
            <a class="other-link" href="product-sunlit-manuscript.html"><span>日光手稿</span><small>Sunlit Manuscript</small></a>
            <a class="other-link" href="product-sea-breeze.html"><span>海風翻頁</span><small>Sea Breeze Pages</small></a>
            <a class="other-link" href="product-quiet-afterword.html"><span>靜謐續章</span><small>Quiet Afterword</small></a>
        </div>
    </section>
</body>

</html>
